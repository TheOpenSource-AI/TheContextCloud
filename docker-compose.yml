services:
  # ──────────────────────────────────────────
  # PostgreSQL 16 + Apache AGE (Graph Engine)
  # ──────────────────────────────────────────
  postgres:
    image: apache/age:latest
    container_name: cc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: contextcloud
      POSTGRES_USER: cc_admin
      POSTGRES_PASSWORD: cc_dev_password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc_admin -d contextcloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis 7 (Cache + Rate Limiting)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────
  # MinIO (S3-Compatible Object Storage)
  # ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cc-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # ──────────────────────────────────────────
  # Apache Kafka (KRaft mode — no Zookeeper)
  # ──────────────────────────────────────────
  kafka:
    image: bitnami/kafka:latest
    container_name: cc-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pg_data:
  minio_data:
